<main class="app-shell">
  <section class="lookup-panel" aria-labelledby="lookup-title">
    <div>
      <p class="eyebrow">Performer Catalog</p>
      <h1 id="lookup-title">Find and review performer profiles</h1>
    </div>

    <form class="lookup-form" aria-label="Performer lookup">
      <label for="performer-search">Performer name</label>
      <div class="lookup-row">
        <input
          id="performer-search"
          name="performer-search"
          type="search"
          autocomplete="off"
          placeholder="Search by performer name"
        />
        <button type="submit">Search</button>
      </div>
    </form>
  </section>

  <section class="catalog-layout" aria-label="Performer catalog">
    <aside class="performer-list" aria-labelledby="performer-list-title">
      <h2 id="performer-list-title">Performers</h2>
      <p class="empty-state">Search results will appear here.</p>
    </aside>

    <section class="performer-detail" aria-labelledby="performer-detail-title">
      <h2 id="performer-detail-title">Profile details</h2>
      <p class="empty-state">
        Select a performer to view profile information, source matches, and links.
      </p>
    </section>
  </section>
</main>
