<main class="app-shell">
  <section class="catalog-layout" aria-label="Performer catalog">
    <aside class="sidebar-column" aria-label="Performer lookup and list">
      <app-performer-lookup-section
        [lookupForm]="lookupForm"
        [addError]="addError()"
        (addPerformer)="addPerformer()"
      />

      <app-performer-list-section
        [performers]="performers()"
        [selectedPerformerId]="selectedPerformerId()"
        (performerSelected)="selectPerformer($event)"
      />
    </aside>

    <app-performer-details-section
      [profile]="selectedProfile()"
      [selectedAge]="selectedAge()"
      [creditsOpen]="creditsOpen()"
      (toggleCredits)="toggleCredits()"
    />
  </section>
</main>
