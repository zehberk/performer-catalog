<aside class="performer-list" aria-labelledby="performer-list-title">
  <div class="panel-heading">
    <h2 id="performer-list-title">Performers</h2>
    <span>{{ performers().length }}</span>
  </div>

  @if (performers().length > 0) {
    <div class="performer-scroll" role="listbox" aria-label="Performers">
      @for (performer of performers(); track performer.id) {
        <button
          #performerOption
          type="button"
          class="performer-option"
          [attr.data-performer-id]="performer.id"
          [class.is-selected]="selectedPerformerId() === performer.id"
          [attr.aria-selected]="selectedPerformerId() === performer.id"
          (click)="onSelectPerformer(performer)"
          (contextmenu)="onOpenContextMenu($event, performer)"
        >
          <span>{{ performer.name }}</span>
          <span class="performer-option__meta">
            @if (performer.matchedAlias) {
              <span
                class="status status--alias"
                [attr.title]="'Matched alias: ' + performer.matchedAlias"
              >
                {{ performer.matchedAlias }}
              </span>
            }
            @if (!performer.completed) {
              <span class="status">{{ performer.noInfoFound ? 'No info found' : 'Missing' }}</span>
            }
          </span>
        </button>
      }
    </div>
  } @else {
    <p class="empty-state">No performers match the current search.</p>
  }

  @if (contextMenu(); as menu) {
    <app-performer-context-menu
      [x]="menu.x"
      [y]="menu.y"
      [actions]="contextMenuActions"
      (menuClosed)="onCloseContextMenu()"
      (actionSelected)="onMenuActionSelected($event)"
    />
  }
</aside>
